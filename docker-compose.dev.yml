services:

  postgres:
    image: postgres:16-alpine
    container_name: vales-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bpta_db_vales_salida
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vales-network

  redis:
    image: redis:7-alpine
    container_name: vales-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vales-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vales-api
    restart: unless-stopped
    environment:
      TZ: America/Mexico_City
      DATABASE_URL: postgresql://postgres:root@postgres:5432/bpta_db_vales_salida
      SECRET_KEY: dev-secret-key-change-in-production
      DEFAULT_ADMIN_EMAIL: admin@bapta.com
      DEFAULT_ADMIN_PASSWORD: root
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DEBUG: "true"
      HOST: 0.0.0.0
      PORT: "8001"
    ports:
      - "8001:8001"
    volumes:
      - .:/app
      - api_temp_files:/app/temp_files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    networks:
      - vales-network

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vales-celery
    restart: unless-stopped
    environment:
      TZ: America/Mexico_City
      DATABASE_URL: postgresql://postgres:root@postgres:5432/bpta_db_vales_salida
      SECRET_KEY: dev-secret-key-change-in-production
      DEFAULT_ADMIN_EMAIL: admin@bapta.com
      DEFAULT_ADMIN_PASSWORD: root
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DEBUG: "true"
    volumes:
      - .:/app
      - api_temp_files:/app/temp_files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: celery -A app.shared.tasks.celery_app worker --loglevel=info
    networks:
      - vales-network

  frontend:
    image: node:20-alpine
    container_name: vales-frontend
    working_dir: /app
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_APP_NAME: Sistema de Vales GPA
      BACKEND_URL: http://vales-api:8001
    ports:
      - "3000:3000"
    volumes:
      - ../gpa-material-vouchers-web:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      api:
        condition: service_started
    networks:
      - vales-network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: vales-nginx
    restart: unless-stopped
    environment:
      SERVER_IP: 127.0.0.1
    ports:
      - "8080:80"
      - "9443:443"
    volumes:
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - frontend
    networks:
      - vales-network

volumes:
  postgres_data:
  redis_data:
  api_temp_files:
  nginx_certs:
  frontend_node_modules:

networks:
  vales-network:
    driver: bridge
